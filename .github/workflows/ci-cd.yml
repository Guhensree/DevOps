name: AIRMAN Production Pipeline

on:
  push:
    branches: [ "dev", "staging", "main" ]
  pull_request:
    branches: [ "dev", "staging", "main" ]

jobs:
  test-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci

      - name: Run Security Vulnerability Scan
        run: npm audit --audit-level=high

  build-and-containerize:
    needs: test-and-scan
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: guhensree
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false 
          tags: guhensree/airman-audit-api:${{ github.sha }}

  deploy:
    needs: build-and-containerize
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Determine Environment Context
        id: env-setup
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "DEPLOY_ENV=prod" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            echo "DEPLOY_ENV=staging" >> $GITHUB_ENV
          else
            echo "DEPLOY_ENV=dev" >> $GITHUB_ENV
          fi

      - name: Execute Mock Deployment
        run: |
          echo "Initiating deployment sequence..."
          echo "Target Environment: $DEPLOY_ENV"
          echo "Applying Terraform state for $DEPLOY_ENV..."
          echo "Deploying image guhensree/airman-audit-api:${{ github.sha }} to AWS ECS..."
          echo "Verifying health checks..."
          echo "Deployment to $DEPLOY_ENV completed safely!"
