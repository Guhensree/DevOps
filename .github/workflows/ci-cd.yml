name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - staging
      - dev
  pull_request:
    branches:
      - main
      - staging
      - dev

jobs:
  test-and-scan:
    name: Test and Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Security Vulnerability Scan
        run: npm audit --audit-level=high

  build-and-containerize:
    name: Build and Containerize
    runs-on: ubuntu-latest
    needs: test-and-scan
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: Guhensree
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Tag Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: guhensree/airman-audit-api:${{ github.sha }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-containerize
    steps:
      - name: Mock Deployment
        run: |
          # Determine environment based on branch
          if [ "${{ github.ref_name }}" = "main" ]; then
            ENV="prod"
          elif [ "${{ github.ref_name }}" = "staging" ]; then
            ENV="staging"
          else
            ENV="dev"
          fi
          
          echo "Determined Deployment Environment: $ENV"
          echo "================================================="
          echo "Applying Terraform state for environment: $ENV..."
          echo "Executing: terraform workspace select $ENV || terraform workspace new $ENV"
          echo "Executing: terraform apply -var=\"environment=$ENV\" -auto-approve"
          echo "Terraform application successful."
          echo "================================================="
          echo "Deploying Docker image guhensree/airman-audit-api:${{ github.sha }} to $ENV environment..."
          echo "Deployment successful."
