name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - staging
      - dev
  pull_request:
    branches:
      - main
      - staging
      - dev

jobs:
  test-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Security vulnerability scan
        run: npm audit --audit-level=high

  build-and-containerize:
    needs: test-and-scan
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: guhensree
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: guhensree/airman-audit-api:${{ github.sha }}

  deploy:
    needs: build-and-containerize
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine Environment and Mock Deploy
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          
          if [ "$BRANCH_NAME" = "main" ]; then
            ENV="prod"
          elif [ "$BRANCH_NAME" = "staging" ]; then
            ENV="staging"
          else
            ENV="dev"
          fi
          
          echo "Target Environment: $ENV"
          echo "Applying Terraform state for $ENV..."
          echo "Deploying Docker image 'guhensree/airman-audit-api:${{ github.sha }}' to $ENV..."
          echo "Deployment successful!"
